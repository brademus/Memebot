name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Jupiter entry and exit tests
        run: node --test dist/paper/execution.test.js

      - name: Best Buy lane tests
        run: node --test dist/api/bestbuys.test.js

      - name: Scoring calibration parity tests
        run: node --test dist/scoring/score.test.js

      - name: State-machine tests
        run: node --test dist/scoring/states.test.js

      - name: Dashboard JavaScript syntax
        run: node --check public/app.js && node --check public/no-admin.js && node --check public/observed-wins.js

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build 2>&1 | tee typescript-build.log

      - name: Retain TypeScript build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-build-${{ github.run_id }}
          path: typescript-build.log
          retention-days: 7

      - name: Jupiter built and simulated entry and exit tests
        run: node --test dist/paper/execution.test.js

      - name: Jupiter quote classification tests
        run: node --test dist/paper/quote-status.test.js

      - name: Paper persistence health tests
        run: node --test dist/paper/persistence-health.test.js

      - name: Best Buy lane tests
        run: node --test dist/api/bestbuys.test.js

      - name: Scoring calibration parity tests
        run: node --test dist/scoring/score.test.js

      - name: State-machine and abstention tests
        run: node --test dist/scoring/states.test.js

      - name: Exact forward snapshot tests
        run: node --test dist/tuning/snapshots.test.js

      - name: Competing-risk monotonicity test
        run: node --test --test-name-pattern="high-quality" dist/model/model.test.js

      - name: Funding-entity graph test
        run: node --test --test-name-pattern="shared funding" dist/model/model.test.js

      - name: Event-time burst quality test
        run: node --test --test-name-pattern="event-time" dist/model/model.test.js

      - name: Regime classification test
        run: node --test --test-name-pattern="regime classifier" dist/model/model.test.js

      - name: Observation milestone test
        run: node --test --test-name-pattern="observations include" dist/model/model.test.js

      - name: Full test manifest
        run: npm test

      - name: Dashboard JavaScript syntax
        run: node --check public/app.js && node --check public/no-admin.js && node --check public/observed-wins.js

  postgres-persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memebot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memebot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memebot_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Real Postgres paper persistence contract
        run: node --test dist/paper/persistence.integration.test.js

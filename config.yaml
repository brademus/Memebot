# ============================================================
# MEMEWATCH CONFIG — every threshold lives here, not in code.
# Tune freely; worker hot-reloads this file every 60s.
# ============================================================

gates:
  mint_authority_revoked: true        # kill if dev can still mint
  freeze_authority_inactive: true     # kill if dev can freeze wallets
  top3_holder_pct_max: 35             # excl. LP; kill above this
  hard_reject_top_holder_pct: 50      # single holder above this = untradeable
  honeypot_sim: true                  # Jupiter sell-quote must succeed
  lp_locked_or_burned: true           # via RugCheck markets data
  liq_to_mcap_ratio_min: 0.08         # AMM-pool tokens only (post-graduation)
  min_liquidity_usd: 9000             # AMM-pool tokens (was 12k; a $4.8K-liq kill missed a measured 64.8x)
  min_liquidity_sol_curve: 8          # bonding-curve floor in SOL (price-independent). Fresh curve ~30 SOL; 8 filters dead sub-launches
  rugcheck_score_max: 5000            # RugCheck risk score ceiling (lower = safer)
  require_social: false               # true = hard-kill tokens with no X/TG/website

prefilter:
  enabled: true
  serial_launcher_24h: 3
  symbol_wave_per_hour: 3
  min_symbol_len: 2
  max_symbol_len: 14

traction_floor:
  enabled: true
  min_trades: 6
  min_bonded_sol: 1.5
  pending_purge_min: 12

deployer:
  enabled: true
  rep_enabled: true
  rep_max_delta: 6
  rep_serial_min: 10
  min_wallet_age_hours: 1
  max_prior_tokens_24h: 3
  blacklist_auto: true

bundle:
  enabled: true
  cluster_merge_enabled: true          # merge slot-0 buyers sharing a non-CEX funder
  cluster_max_buyers: 30               # cap Helius fan-out for cluster analysis
  max_insider_supply_pct: 25
  max_funded_snipers: 2
  count_all_slot0_as_insider: false
  total_supply: 1000000000

age:
  max_token_age_minutes: 240
  freshness_half_life_minutes: 90

weights:
  velocity: 25
  organic: 20
  social: 15
  buy_pressure: 15
  freshness: 10
  smart_money: 15

states:
  heating_score_min: 50
  trigger_score_min: 65
  trigger_min_trades: 12
  trigger_min_unique_buyers: 12
  trigger_buy_ratio_min: 1.3
  early_runner_enabled: true           # let breadth-confirmed runners alert before the normal persistence age
  early_runner_min_age: 2
  early_runner_min_buyers: 20
  early_runner_min_trades: 25
  extended_pct: 40
  dying_score_drop: 15
  dying_buy_ratio_max: 0.8

ai:
  enabled: true
  note_model: gemini-3.5-flash
  review_model: gemini-3.5-flash
  conviction_enabled: true
  conviction_model: gemini-3.5-flash
  conviction_max_delta: 6

bestbuys:
  max_shown: 3
  min_score: 68
  require_social: true
  min_unique_buyers: 10
  min_trades: 15
  min_curve_sol: 40
  max_dev_pct: 7
  exit_score: 56
  min_hold_seconds: 120
  reentry_cooldown_min: 15
  supersede_margin: 12
  min_age_minutes: 4
  min_retention: 0.65
  net_inflow_window_min: 3
  smart_lane: true
  smart_lane_min_wallets: 2
  smart_lane_window_min: 30
  smart_lane_min_score: 55
  smart_lane_min_age_min: 2
  smart_lane_exit_score: 45
  pregrad_lane: true                   # catch the run into graduation
  pregrad_min_pct: 0.8
  secondwave_lane: true                # post-graduation retrace entry on clean structure
  secondwave_max_age_min: 180
  secondwave_min_fill_min: 30
  secondwave_min_retrace: 0.25
  secondwave_max_retrace: 0.4
  max_cluster_pct: 25

alerts:
  telegram_on_trigger: true
  realert_score_jump: 15

polling:
  dexscreener_interval_ms: 10000
  outcome_snapshot_minutes: [60, 240, 1440]

wallets:
  enabled: true
  discovery_min_multiple: 3
  wallet_min_winners: 2
  early_buyer_slot_window: 3
  max_tracked_wallets: 1000
  hit_recency_hours: 6
  webhook_enabled: true
  prune_min_measured_buys: 5
  prune_max_2x_rate: 0.08
  elite_min_winners: 10
  elite_weight: 3
  quality_validation: true
  quality_min_verdict: MARGINAL
  quality_recheck_days: 5
  cobuyer_expansion: true
  cobuyer_min_shared: 2
  idle_deactivate_days: 7
  winner_mining_enabled: true
  winner_mining_hours: 3
  winner_mining_min_pct: 300
  winner_mining_max_mints: 15
  winner_mining_max_vet: 25

limits:
  max_tracked_tokens: 600
  dexscreener_batch_size: 30

conviction:
  enabled: true
  min_score: 72
  min_trigger_hold_seconds: 90
  require_clean_bundle: true
  min_smart_wallets: 1
  smart_wallet_window_min: 30
  require_social: true
  max_run_pct: 25
  max_alerts_per_day: 5

learning:
  enabled: true
  window_days: 14
  min_samples: 8
  min_hours_between_changes: 12
  loosen_false_kill_rate: 0.05

momentum:
  enabled: false
  poll_seconds: 180
  min_liquidity_usd: 30000
  min_vol24h_usd: 150000
  max_age_hours: 72
  min_change24h_pct: 50
  max_change5m_pct: 45

launch_signals:
  graduation_curve_sol: 69
  graduation_bonus_max: 6
  dead_hours_utc: [5, 6, 7, 8, 9, 10, 11]
  dead_hours_penalty: 0
  tg_shell_max_members: 25
  tg_real_min_members: 200

calibration:
  enabled: true
  freeze_age_min: 3
  window_days: 21
  min_samples: 60
  min_winners: 12
  win_multiple: 3
  learning_rate: 0.34
  min_weight: 3
  max_weight: 45

social:
  enabled: true
  boost_poll_seconds: 90
  boost_surface_min: 30

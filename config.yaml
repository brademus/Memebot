# MEMEWATCH CONFIG — validated and hot-reloaded every 60 seconds.

gates:
  mint_authority_revoked: true
  freeze_authority_inactive: true
  top3_holder_pct_max: 35
  hard_reject_top_holder_pct: 50
  honeypot_sim: true
  lp_locked_or_burned: true
  liq_to_mcap_ratio_min: 0.08
  min_liquidity_usd: 9000
  min_liquidity_sol_curve: 8
  curve_min_liquidity_usd: 1200
  rugcheck_score_max: 5000
  require_social: false

prefilter:
  enabled: true
  serial_launcher_24h: 3
  symbol_wave_per_hour: 3
  min_symbol_len: 2
  max_symbol_len: 14

traction_floor:
  enabled: true
  min_trades: 6
  min_bonded_sol: 1.5
  pending_purge_min: 12

deployer:
  enabled: true
  rep_enabled: true
  rep_max_delta: 6
  rep_serial_min: 10
  min_wallet_age_hours: 1
  max_prior_tokens_24h: 3
  blacklist_auto: true

bundle:
  enabled: true
  cluster_merge_enabled: true
  cluster_max_buyers: 30
  max_insider_supply_pct: 22    # evidence-backed tightening remains active
  max_funded_snipers: 2
  count_all_slot0_as_insider: false
  total_supply: 1000000000

age:
  max_token_age_minutes: 240
  freshness_half_life_minutes: 90

# Applied from exact-forward-time evidence; learning remains suggest-only.
weights:
  velocity: 17.3
  organic: 30.7
  social: 15.7
  buy_pressure: 19.5
  freshness: 6.9
  smart_money: 9.9

states:
  heating_score_min: 50
  trigger_score_min: 44
  trigger_min_trades: 12
  trigger_min_unique_buyers: 12
  trigger_buy_ratio_min: 1.3
  early_runner_enabled: true
  early_runner_min_age: 2
  early_runner_min_buyers: 20
  early_runner_min_trades: 25
  extended_pct: 75              # 40% was pre-empting qualified fast runners before persistence matured
  dying_score_drop: 15
  dying_buy_ratio_max: 0.8

ai:
  enabled: true
  note_model: gemini-3.5-flash
  review_model: gemini-3.5-flash
  conviction_enabled: true
  conviction_model: gemini-3.5-flash
  conviction_max_delta: 6

bestbuys:
  max_shown: 3
  min_score: 60                 # B-or-better candidates may enter only with independent confirmation
  require_social: false         # social OR clean bundle OR measured smart money is required in code
  min_unique_buyers: 8
  min_trades: 15
  min_curve_sol: 30
  max_dev_pct: 7
  exit_score: 52
  min_hold_seconds: 120
  reentry_cooldown_min: 15
  supersede_margin: 12
  min_age_minutes: 3
  min_retention: 0.65
  net_inflow_window_min: 3
  smart_lane: true
  smart_lane_min_wallets: 2
  smart_lane_window_min: 30
  smart_lane_min_score: 55
  smart_lane_min_age_min: 2
  smart_lane_exit_score: 45
  pregrad_lane: true
  pregrad_min_pct: 0.8
  secondwave_lane: true
  secondwave_max_age_min: 180
  secondwave_min_fill_min: 30
  secondwave_min_retrace: 0.25
  secondwave_max_retrace: 0.4
  max_cluster_pct: 25

alerts:
  telegram_on_trigger: true
  realert_score_jump: 15

paper:
  require_jupiter_quote: true
  target_multiple: 3
  stop_multiple: 0.5
  max_hold_hours: 24
  position_sol: 0.1
  max_liquidity_pct: 0.005
  min_position_usd: 10
  slippage_bps: 150
  max_price_impact_pct: 0.08
  quote_timeout_ms: 4000
  min_forward_samples_per_lane: 100

# The legacy score is a candidate generator. Signal Stack v3 remains shadow-only until
# its executable promotion evidence clears the production gate.
signal_model:
  enabled: true
  mode: shadow
  require_transaction_simulation: true
  min_rank_percentile: 0.90
  min_target_before_stop: 0.08
  max_downside_probability: 0.42
  max_graph_risk: 0.35
  max_burst_exhaustion: 0.55
  max_uncertainty: 0.32
  min_expected_value: 0.08
  min_feature_completeness: 0.68
  min_execution_score: 0.65
  min_independent_entity_ratio: 0.55
  decision_ttl_seconds: 45
  min_cohort_size: 8
  route_stability_max_bps: 350
  regime_change_abstain_threshold: 0.78
  probe_sizes_sol: [0.05, 0.1, 0.25]

polling:
  dexscreener_interval_ms: 10000
  outcome_snapshot_minutes: [60, 240, 1440]

wallets:
  enabled: true
  discovery_min_multiple: 3
  wallet_min_winners: 2
  early_buyer_slot_window: 3
  max_tracked_wallets: 1000
  hit_recency_hours: 6
  webhook_enabled: true
  prune_min_measured_buys: 5
  prune_max_2x_rate: 0.08
  elite_min_winners: 10
  elite_weight: 3
  quality_validation: true
  quality_min_verdict: MARGINAL
  quality_recheck_days: 5
  cobuyer_expansion: true
  cobuyer_min_shared: 2
  idle_deactivate_days: 7
  winner_mining_enabled: true
  winner_mining_hours: 3
  winner_mining_min_pct: 300
  winner_mining_max_mints: 15
  winner_mining_max_vet: 25

limits:
  max_tracked_tokens: 600
  dexscreener_batch_size: 30

conviction:
  enabled: true
  min_score: 64
  min_trigger_hold_seconds: 45
  require_clean_bundle: true
  min_smart_wallets: 1
  smart_wallet_window_min: 30
  require_social: true
  max_run_pct: 80               # measured from trigger entry, not the much earlier first-score baseline
  max_alerts_per_day: 5

learning:
  enabled: true
  window_days: 14
  min_samples: 8
  min_hours_between_changes: 12
  loosen_false_kill_rate: 0.05

momentum:
  enabled: true
  poll_seconds: 180
  min_liquidity_usd: 30000
  min_vol24h_usd: 150000
  max_age_hours: 72
  min_change24h_pct: 50
  max_change5m_pct: 45

launch_signals:
  graduation_curve_sol: 69
  graduation_bonus_max: 6
  dead_hours_utc: [5, 6, 7, 8, 9, 10, 11]
  dead_hours_penalty: 0
  tg_shell_max_members: 25
  tg_real_min_members: 200

calibration:
  enabled: true
  freeze_age_min: 3
  window_days: 21
  min_samples: 60
  min_winners: 12
  win_multiple: 3
  learning_rate: 0.34
  min_weight: 3
  max_weight: 45

social:
  enabled: true
  boost_poll_seconds: 90
  boost_surface_min: 30
